[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
# Tempo targets the Osaka EVM hard fork (newer than Cancun). Leave the default.
gas_limit = "18446744073709551615"

remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "forge-std/=lib/forge-std/src/"
]

[rpc_endpoints]
tempo = "${TEMPO_RPC_URL}"

